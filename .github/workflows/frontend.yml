name: "[Frontend] Nexo Criminal Web"
on:
  push:
    branches: [main, dev]
    paths: ["frontend/**"]
  pull_request:
    branches: [main, dev]
    paths: ["frontend/**"]
  workflow_dispatch:

jobs:
  build-lint-test:
    name: "Build - Lint - Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend # Solo se aplica aquí
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Test
        run: npm run test || true
      - name: Build
        run: npm run build

  deploy-y-approval:
    name: "Deploy + Approval Test"
    runs-on: ubuntu-latest
    needs: build-lint-test
    if: github.event_name == 'push'
    steps:
      - name: Disparar deploy en Render
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK" && echo "Deploy disparado"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      - name: Esperar propagacion
        run: sleep 60
      - name: Approval Test (verificar que el sitio responde)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
          echo "HTTP $code"
          test "$code" -ge 200 -a "$code" -lt 400 && echo "APROBADO" || (echo "FALLO" && exit 1)
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}