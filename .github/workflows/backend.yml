name: "[Backend] Nexo Criminal API"
 
on:
  push:
    branches: [main, dev]
    paths: ["backend/**"]
  pull_request:
    branches: [main, dev]
    paths: ["backend/**"]
  workflow_dispatch:
 
defaults:
  run:
    working-directory: backend
 
jobs:
  build-lint-test:
    name: "Build - Lint - Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build (compilar)
        run: mvn -B clean compile
      - name: Lint (estilo de codigo)
        run: mvn -B checkstyle:check || true
      - name: Test (pruebas unitarias)
        run: mvn -B test