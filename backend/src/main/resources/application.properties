# ============================================================
# Nexo Criminal - Configuracion de la aplicacion
# ============================================================

spring.application.name=nexo-criminal-backend

# ---- Server ----
# Render asigna el puerto via variable PORT
server.port=${PORT:8080}

# ---- Base de datos PostgreSQL ----
# En produccion, Render provee DATABASE_URL como variable de entorno
# En desarrollo local, usa los valores por defecto
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nexo_criminal}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ---- Jackson ----
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-self-references=false

# ---- JWT ----
nexo.jwt.secret=${JWT_SECRET:ClaveSecretaDevelopmentSoloParaPruebasLocalesNoUsarEnProd2026}
nexo.jwt.expiracion-horas=8

# ---- CORS ----
# Acepta multiples origenes separados por coma
nexo.cors.origenes=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ---- Logs ----
logging.level.com.nexocriminal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ---- Motor Red Thread ----
nexo.engine.nodo-logistico.radio-metros=500
nexo.engine.nodo-logistico.ventana-horas=2
nexo.engine.nodo-logistico.min-vehiculos=3

nexo.engine.escolta.radio-metros=100
nexo.engine.escolta.ventana-minutos=2
nexo.engine.escolta.min-coincidencias=3

nexo.engine.circulo.max-grados=2
nexo.engine.modus.umbral=0.75

# ---- Personas Desaparecidas - Motor ----
nexo.engine.desaparicion.radio-cluster-metros=1500
nexo.engine.desaparicion.min-cluster=3
nexo.engine.desaparicion.ventana-dias=30
nexo.engine.desaparicion.radio-nodo-sospechoso=1000

# ---- Uploads ----
nexo.uploads.directorio=${UPLOADS_DIR:uploads}

# ---- Multipart ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Anthropic Claude IA ----
nexo.ia.api-key=${ANTHROPIC_API_KEY:}
nexo.ia.modelo=claude-sonnet-4-5
nexo.ia.max-tokens=2048
nexo.ia.url=https://api.anthropic.com/v1/messages

# ---- Fuentes de Datos Externas ----
# Modo: CNE | API | AMBAS
nexo.fuentes.modo=${FUENTES_MODO:AMBAS}
# En modo AMBAS, cual fuente es prioritaria: CNE | API
nexo.fuentes.prioridad=${FUENTES_PRIORIDAD:CNE}

# CNE (scraping)
nexo.fuentes.cne.url=${CNE_URL:http://www.cne.gob.ve/web/registro_electoral/ce.php}
nexo.fuentes.cne.timeout-ms=8000
# Mock para demo (el CNE suele estar geo-bloqueado desde el exterior)
nexo.fuentes.cne.mock=${CNE_MOCK:true}

# API del profesor (pendiente de URL real)
nexo.fuentes.api-profesor.url=${API_PROFESOR_URL:}
nexo.fuentes.api-profesor.api-key=${API_PROFESOR_KEY:}
nexo.fuentes.api-profesor.timeout-ms=8000
